name: Build Amethyst IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15   # Более новая версия macOS

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake ninja
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build Project
        run: |
          echo "Starting build..."
          make -j3 || echo "Make failed, trying xcodebuild..."
          # Если есть xcodebuild
          if [ -f "Amethyst.xcodeproj/project.pbxproj" ]; then
            xcodebuild -project Amethyst.xcodeproj -scheme Amethyst -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO clean build
          fi

      - name: Find and Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-IPA
          path: |
            *.ipa
            build/*.ipa
            **/*.ipa
          if-no-files-found: warn
